name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          set -euo pipefail

          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          FORMULA_FILE="Formula/${FORMULA}.rb"

          if [ ! -f "$FORMULA_FILE" ]; then
            echo "::error::Formula not found: $FORMULA_FILE"
            exit 1
          fi

          OLD_VERSION=$(grep -m1 'version "' "$FORMULA_FILE" | sed 's/.*version "//;s/".*//')
          echo "Updating ${FORMULA} from ${OLD_VERSION} to ${VERSION}"

          # Update version string and download URLs
          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA_FILE"
          sed -i "s|/download/v${OLD_VERSION}/|/download/v${VERSION}/|g" "$FORMULA_FILE"

          # Download each binary and update its SHA256
          CURRENT_URL=""
          while IFS= read -r line; do
            if [[ "$line" =~ url\ \"(.+)\" ]]; then
              CURRENT_URL="${BASH_REMATCH[1]}"
              echo "Downloading: $CURRENT_URL"
              curl -sfL "$CURRENT_URL" -o /tmp/binary || {
                echo "::error::Failed to download $CURRENT_URL"
                exit 1
              }
              NEW_SHA=$(sha256sum /tmp/binary | awk '{print $1}')
            elif [[ -n "$CURRENT_URL" && "$line" =~ sha256\ \"([a-f0-9]+)\" ]]; then
              OLD_SHA="${BASH_REMATCH[1]}"
              sed -i "s/${OLD_SHA}/${NEW_SHA}/" "$FORMULA_FILE"
              CURRENT_URL=""
            fi
          done < "$FORMULA_FILE"

          echo "Updated formula:"
          cat "$FORMULA_FILE"

      - name: Commit and push
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update ${FORMULA} to v${VERSION}"
          git push
